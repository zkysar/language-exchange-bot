<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5865F2"/>
      <stop offset="100%" style="stop-color:#3B44C4"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Back bubble (up-right) -->
  <rect x="195" y="110" width="230" height="145" rx="30" ry="30" fill="#06D6A0" opacity="0.95"/>
  <!-- Multilingual text -->
  <text x="240" y="170" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="white">Aa</text>
  <text x="315" y="170" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#FFD166">あ</text>
  <rect x="240" y="192" width="130" height="8" rx="4" fill="white" opacity="0.4"/>
  <rect x="240" y="212" width="85" height="8" rx="4" fill="white" opacity="0.4"/>

  <!-- Front bubble (down-left, overlapping) -->
  <rect x="85" y="230" width="230" height="140" rx="30" ry="30" fill="white" opacity="0.95"/>
  <!-- Typing dots -->
  <circle cx="165" cy="300" r="12" fill="#5865F2" opacity="0.5"/>
  <circle cx="200" cy="300" r="12" fill="#5865F2" opacity="0.5"/>
  <circle cx="235" cy="300" r="12" fill="#5865F2" opacity="0.5"/>
</svg>